name: Secure Code Delivery Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: platform-demo

jobs:

  # ── Stage 1: Build, Test, Coverage ─────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and test with coverage
        run: ./mvnw clean verify

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            target/*.jar
            target/site/jacoco/

  # ── Extract Experience ID from branch ──────────────────────────────
  extract-ticket:
    runs-on: ubuntu-latest
    outputs:
      ticket_id: ${{ steps.snow.outputs.ticket_id }}
      ticket_summary: ${{ steps.snow.outputs.ticket_summary }}
      ticket_status: ${{ steps.snow.outputs.ticket_status }}
      ticket_url: ${{ steps.snow.outputs.ticket_url }}
      ticket_sys_id: ${{ steps.snow.outputs.ticket_sys_id }}
      ticket_description: ${{ steps.snow.outputs.ticket_description }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract ServiceNow CR from branch
        id: snow
        env:
          SERVICENOW_INSTANCE: ${{ vars.SERVICENOW_INSTANCE }}
          SERVICENOW_USER: ${{ secrets.SERVICENOW_USER }}
          SERVICENOW_PASSWORD: ${{ secrets.SERVICENOW_PASSWORD }}
        run: python scripts/servicenow_integration.py extract

  # ── Stage 2a: SAST — Semgrep ──────────────────────────────────────
  sast-semgrep:
    runs-on: ubuntu-latest
    needs: build-and-test
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: |
          semgrep scan \
            --config=auto \
            --config=p/owasp-top-ten \
            --config=p/java \
            --sarif \
            --output=semgrep-results.sarif \
            src/main/java/

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.sarif

  # ── Stage 2b: SAST — SonarCloud ───────────────────────────────────
  sast-sonarqube:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw clean verify sonar:sonar \
            -Dsonar.projectKey=cthompson72_platform-pipeline-demo \
            -Dsonar.organization=cthompson72 \
            -Dsonar.host.url=https://sonarcloud.io

  # ── Stage 2c: AI Code Review (PR only) ────────────────────────────
  ai-code-review:
    runs-on: ubuntu-latest
    needs: [build-and-test, extract-ticket]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run AI Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TICKET_ID: ${{ needs.extract-ticket.outputs.ticket_id }}
          TICKET_SUMMARY: ${{ needs.extract-ticket.outputs.ticket_summary }}
          TICKET_DESCRIPTION: ${{ needs.extract-ticket.outputs.ticket_description }}
          TICKET_URL: ${{ needs.extract-ticket.outputs.ticket_url }}
          SERVICENOW_INSTANCE: ${{ vars.SERVICENOW_INSTANCE }}
        run: python scripts/ai-review.py

  # ── Stage 3a: Dependency Scan — Trivy ──────────────────────────────
  dependency-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-results
          path: trivy-fs-results.sarif

  # ── Stage 3b: Container Build, Push, and Scan ─────────────────────
  container-build-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      id-token: write
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: ./mvnw package -DskipTests

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_URI="${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: docker build -t ${{ steps.meta.outputs.image_uri }} .

      - name: Scan container image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image_uri }}
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image_uri }}
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Push image to Artifact Registry
        run: docker push ${{ steps.meta.outputs.image_uri }}

  # ── Stage 3c: Secret Detection — Gitleaks ──────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source=. --config=.gitleaks.toml --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 4: Deploy to Staging ─────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sast-sonarqube, dependency-scan, container-build-scan, secret-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    outputs:
      staging_ip: ${{ steps.deploy.outputs.staging_ip }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ vars.GKE_REGION }}

      - name: Deploy to staging
        id: deploy
        run: |
          chmod +x k8s/deploy.sh
          bash k8s/deploy.sh \
            "${{ needs.container-build-scan.outputs.image_uri }}" \
            "staging" \
            "${{ needs.extract-ticket.outputs.ticket_id || 'none' }}" \
            "${{ github.sha }}"
          
          for i in $(seq 1 30); do
            STAGING_IP=$(kubectl get svc platform-demo -n staging -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
            if [ -n "$STAGING_IP" ]; then
              echo "staging_ip=$STAGING_IP" >> $GITHUB_OUTPUT
              break
            fi
            sleep 10
          done

  # ── Stage 5: DAST against Staging ──────────────────────────────────
  dast-staging:
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Wait for staging to be healthy
        run: |
          STAGING_URL="http://${{ needs.deploy-staging.outputs.staging_ip }}"
          echo "Waiting for staging at $STAGING_URL..."
          for i in $(seq 1 30); do
            if curl -s "${STAGING_URL}/actuator/health" | grep -q "UP"; then
              echo "Staging is ready"
              break
            fi
            echo "Attempt $i/30..."
            sleep 10
          done

      - name: Update OpenAPI spec with staging URL
        run: |
          sed -i "s|http://localhost:8080|http://${{ needs.deploy-staging.outputs.staging_ip }}|g" openapi.yaml

      - name: ZAP API Scan against staging
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: openapi.yaml
          format: openapi
          allow_issue_writing: false
          cmd_options: '-a'

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html

  # ── Stage 6: Quality Gate ──────────────────────────────────────────
  quality-gate:
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sast-sonarqube, dependency-scan, container-build-scan, secret-scan, dast-staging]
    if: always()
    steps:
      - name: Check all security stages
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║           SECURITY QUALITY GATE RESULTS             ║"
          echo "╠══════════════════════════════════════════════════════╣"
          
          GATE_PASSED=true
          
          check_stage() {
            local name=$1
            local result=$2
            if [ "$result" == "success" ]; then
              echo "║  ✅  $name"
            elif [ "$result" == "skipped" ]; then
              echo "║  ⏭️  $name (skipped)"
            else
              echo "║  ❌  $name"
              GATE_PASSED=false
            fi
          }
          
          check_stage "Semgrep SAST        " "${{ needs.sast-semgrep.result }}"
          check_stage "SonarCloud SAST     " "${{ needs.sast-sonarqube.result }}"
          check_stage "Dependency Scan     " "${{ needs.dependency-scan.result }}"
          check_stage "Container Build/Scan" "${{ needs.container-build-scan.result }}"
          check_stage "Secret Detection    " "${{ needs.secret-scan.result }}"
          check_stage "DAST (Staging)      " "${{ needs.dast-staging.result }}"
          
          echo "╚══════════════════════════════════════════════════════╝"
          
          if [ "$GATE_PASSED" = false ]; then
            echo ""
            echo "🚫 Quality gate FAILED — production deploy blocked"
            exit 1
          fi
          
          echo ""
          echo "✅ Quality gate PASSED — cleared for production"

  # ── Stage 7: Deploy to Production ──────────────────────────────────
  deploy-production:
    runs-on: ubuntu-latest
    needs: [quality-gate, container-build-scan, extract-ticket]
    if: github.ref == 'refs/heads/main' && needs.quality-gate.result == 'success'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ vars.GKE_REGION }}

      - name: Deploy to production
        run: |
          chmod +x k8s/deploy.sh
          bash k8s/deploy.sh \
            "${{ needs.container-build-scan.outputs.image_uri }}" \
            "production" \
            "${{ needs.extract-ticket.outputs.ticket_id || 'none' }}" \
            "${{ github.sha }}"

  # ── Post Results to ServiceNow ─────────────────────────────────────
  update-servicenow:
    runs-on: ubuntu-latest
    needs: [extract-ticket, sast-semgrep, sast-sonarqube, dependency-scan, container-build-scan, secret-scan, dast-staging, quality-gate, deploy-production]
    if: always() && needs.extract-ticket.outputs.ticket_id != ''
    steps:
      - uses: actions/checkout@v4

      - name: Post pipeline results to ServiceNow
        env:
          SERVICENOW_INSTANCE: ${{ vars.SERVICENOW_INSTANCE }}
          SERVICENOW_USER: ${{ secrets.SERVICENOW_USER }}
          SERVICENOW_PASSWORD: ${{ secrets.SERVICENOW_PASSWORD }}
          TICKET_ID: ${{ needs.extract-ticket.outputs.ticket_id }}
          TICKET_SYS_ID: ${{ needs.extract-ticket.outputs.ticket_sys_id }}
          STAGE_SEMGREP: ${{ needs.sast-semgrep.result }}
          STAGE_SONARCLOUD: ${{ needs.sast-sonarqube.result }}
          STAGE_DEPENDENCY_SCAN: ${{ needs.dependency-scan.result }}
          STAGE_CONTAINER_BUILD_SCAN: ${{ needs.container-build-scan.result }}
          STAGE_SECRET_SCAN: ${{ needs.secret-scan.result }}
          STAGE_DAST_STAGING: ${{ needs.dast-staging.result }}
          STAGE_QUALITY_GATE: ${{ needs.quality-gate.result }}
          STAGE_DEPLOY_PRODUCTION: ${{ needs.deploy-production.result }}
        run: python scripts/servicenow_integration.py post-results

  # ── Notify Slack ───────────────────────────────────────────────────
  notify-slack:
    runs-on: ubuntu-latest
    needs: [extract-ticket, sast-semgrep, sast-sonarqube, dependency-scan, container-build-scan, secret-scan, dast-staging, quality-gate, deploy-production]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TICKET_ID: ${{ needs.extract-ticket.outputs.ticket_id }}
          SERVICENOW_INSTANCE: ${{ vars.SERVICENOW_INSTANCE }}
          STAGE_SEMGREP: ${{ needs.sast-semgrep.result }}
          STAGE_SONARCLOUD: ${{ needs.sast-sonarqube.result }}
          STAGE_DEPENDENCY_SCAN: ${{ needs.dependency-scan.result }}
          STAGE_CONTAINER_BUILD_SCAN: ${{ needs.container-build-scan.result }}
          STAGE_SECRET_SCAN: ${{ needs.secret-scan.result }}
          STAGE_DAST_STAGING: ${{ needs.dast-staging.result }}
          STAGE_QUALITY_GATE: ${{ needs.quality-gate.result }}
          STAGE_DEPLOY_PRODUCTION: ${{ needs.deploy-production.result }}
        run: python scripts/slack_notify.py