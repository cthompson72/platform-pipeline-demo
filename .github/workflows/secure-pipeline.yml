name: Secure Code Delivery Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Stage 1: Build, Test, Coverage ─────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and test with coverage
        run: ./mvnw clean verify

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            target/*.jar
            target/site/jacoco/

  # ── Stage 2a: SAST — Semgrep ──────────────────────────────────────
  sast-semgrep:
    runs-on: ubuntu-latest
    needs: build-and-test
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: |
          semgrep scan \
            --config=auto \
            --config=p/owasp-top-ten \
            --config=p/java \
            --sarif \
            --output=semgrep-results.sarif \
            src/main/java/

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.sarif

  # ── Stage 2b: SAST — SonarQube ────────────────────────────────────
  sast-sonarqube:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: false  # Enable when SonarCloud is configured
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and analyze
        run: |
          ./mvnw clean verify sonar:sonar \
            -Dsonar.projectKey=platform-pipeline-demo \
            -Dsonar.projectName=platform-pipeline-demo \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  # ── Stage 3a: Dependency Scan — Trivy ──────────────────────────────
  dependency-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-results
          path: trivy-fs-results.sarif

  # ── Stage 3b: Container Image Scan — Trivy ────────────────────────
  container-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: ./mvnw package -DskipTests

      - name: Build Docker image
        run: docker build -t platform-demo:${{ github.sha }} .

      - name: Scan container image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'platform-demo:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'platform-demo:${{ github.sha }}'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  # ── Stage 3c: Secret Detection — Gitleaks ──────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source=. --config=.gitleaks.toml --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 4: DAST — OWASP ZAP ─────────────────────────────────────
  dast-zap:
    runs-on: ubuntu-latest
    needs: [sast-semgrep, dependency-scan, container-scan, secret-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and start application
        run: |
          ./mvnw package -DskipTests
          java -jar target/*.jar &
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/actuator/health | grep -q "UP"; then
              echo "App is ready"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done

      - name: ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: openapi.yaml
          format: openapi
          allow_issue_writing: false
          cmd_options: '-a'
          docker_network: host

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html

  # ── Stage 5: Quality Gate ──────────────────────────────────────────
  quality-gate:
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sast-sonarqube, dependency-scan, container-scan, dast-zap, secret-scan]
    if: always()
    steps:
      - name: Check all security stages
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║           SECURITY QUALITY GATE RESULTS             ║"
          echo "╠══════════════════════════════════════════════════════╣"
          
          GATE_PASSED=true
          
          check_stage() {
            local name=$1
            local result=$2
            if [ "$result" == "success" ]; then
              echo "║  ✅  $name"
            elif [ "$result" == "skipped" ]; then
              echo "║  ⏭️  $name (skipped)"
            else
              echo "║  ❌  $name"
              GATE_PASSED=false
            fi
          }
          
          check_stage "Semgrep SAST        " "${{ needs.sast-semgrep.result }}"
          check_stage "SonarQube SAST      " "${{ needs.sast-sonarqube.result }}"
          check_stage "Dependency Scan     " "${{ needs.dependency-scan.result }}"
          check_stage "Container Scan      " "${{ needs.container-scan.result }}"
          check_stage "OWASP ZAP DAST      " "${{ needs.dast-zap.result }}"
          check_stage "Secret Detection    " "${{ needs.secret-scan.result }}"
          
          echo "╚══════════════════════════════════════════════════════╝"
          
          if [ "$GATE_PASSED" = false ]; then
            echo ""
            echo "🚫 Quality gate FAILED — deployment blocked"
            exit 1
          fi
          
          echo ""
          echo "✅ Quality gate PASSED — cleared for deployment"
