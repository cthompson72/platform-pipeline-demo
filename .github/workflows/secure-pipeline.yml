name: Secure Code Delivery Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Stage 1: Build, Test, Coverage ─────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and test with coverage
        run: ./mvnw clean verify

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            target/*.jar
            target/site/jacoco/

  # ── Extract Experience ID from branch ──────────────────────────────
  extract-ticket:
    runs-on: ubuntu-latest
    outputs:
      ticket_id: ${{ steps.jira.outputs.ticket_id }}
      ticket_summary: ${{ steps.jira.outputs.ticket_summary }}
      ticket_status: ${{ steps.jira.outputs.ticket_status }}
      ticket_url: ${{ steps.jira.outputs.ticket_url }}
      ticket_description: ${{ steps.jira.outputs.ticket_description }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract Jira ticket from branch
        id: jira
        env:
          JIRA_EMAIL: ${{ vars.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
        run: python scripts/jira_integration.py extract

  # ── Stage 2a: SAST — Semgrep ──────────────────────────────────────
  sast-semgrep:
    runs-on: ubuntu-latest
    needs: build-and-test
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: |
          semgrep scan \
            --config=auto \
            --config=p/owasp-top-ten \
            --config=p/java \
            --sarif \
            --output=semgrep-results.sarif \
            src/main/java/

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.sarif

  # ── Stage 2b: SAST — SonarCloud ───────────────────────────────────
  sast-sonarqube:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw clean verify sonar:sonar \
            -Dsonar.projectKey=cthompson72_platform-pipeline-demo \
            -Dsonar.organization=cthompson72 \
            -Dsonar.host.url=https://sonarcloud.io

  # ── Stage 2c: AI Code Review (PR only) ────────────────────────────
  ai-code-review:
    runs-on: ubuntu-latest
    needs: [build-and-test, extract-ticket]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run AI Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TICKET_ID: ${{ needs.extract-ticket.outputs.ticket_id }}
          TICKET_SUMMARY: ${{ needs.extract-ticket.outputs.ticket_summary }}
          TICKET_DESCRIPTION: ${{ needs.extract-ticket.outputs.ticket_description }}
          JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
        run: python scripts/ai-review.py

  # ── Stage 3a: Dependency Scan — Trivy ──────────────────────────────
  dependency-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-results
          path: trivy-fs-results.sarif

  # ── Stage 3b: Container Image Scan — Trivy ────────────────────────
  container-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: ./mvnw package -DskipTests

      - name: Build Docker image
        run: docker build -t platform-demo:${{ github.sha }} .

      - name: Scan container image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'platform-demo:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'platform-demo:${{ github.sha }}'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  # ── Stage 3c: Secret Detection — Gitleaks ──────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source=. --config=.gitleaks.toml --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 4: DAST — OWASP ZAP ─────────────────────────────────────
  dast-zap:
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sast-sonarqube, dependency-scan, container-scan, secret-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and start application
        run: |
          ./mvnw package -DskipTests
          java -jar target/*.jar &
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/actuator/health | grep -q "UP"; then
              echo "App is ready"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done

      - name: ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: openapi.yaml
          format: openapi
          allow_issue_writing: false
          cmd_options: '-a'
          docker_network: host

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html

  # ── Stage 5: Quality Gate ──────────────────────────────────────────
  quality-gate:
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sast-sonarqube, dependency-scan, container-scan, dast-zap, secret-scan]
    if: always()
    steps:
      - name: Check all security stages
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║           SECURITY QUALITY GATE RESULTS             ║"
          echo "╠══════════════════════════════════════════════════════╣"
          
          GATE_PASSED=true
          
          check_stage() {
            local name=$1
            local result=$2
            if [ "$result" == "success" ]; then
              echo "║  ✅  $name"
            elif [ "$result" == "skipped" ]; then
              echo "║  ⏭️  $name (skipped)"
            else
              echo "║  ❌  $name"
              GATE_PASSED=false
            fi
          }
          
          check_stage "Semgrep SAST        " "${{ needs.sast-semgrep.result }}"
          check_stage "SonarCloud SAST     " "${{ needs.sast-sonarqube.result }}"
          check_stage "Dependency Scan     " "${{ needs.dependency-scan.result }}"
          check_stage "Container Scan      " "${{ needs.container-scan.result }}"
          check_stage "OWASP ZAP DAST      " "${{ needs.dast-zap.result }}"
          check_stage "Secret Detection    " "${{ needs.secret-scan.result }}"
          
          echo "╚══════════════════════════════════════════════════════╝"
          
          if [ "$GATE_PASSED" = false ]; then
            echo ""
            echo "🚫 Quality gate FAILED — deployment blocked"
            exit 1
          fi
          
          echo ""
          echo "✅ Quality gate PASSED — cleared for deployment"

  # ── Post Results to Jira ───────────────────────────────────────────
  update-jira:
    runs-on: ubuntu-latest
    needs: [extract-ticket, sast-semgrep, sast-sonarqube, dependency-scan, container-scan, secret-scan, dast-zap, quality-gate]
    if: always() && needs.extract-ticket.outputs.ticket_id != ''
    steps:
      - uses: actions/checkout@v4

      - name: Post pipeline results to Jira
        env:
          JIRA_EMAIL: ${{ vars.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
          TICKET_ID: ${{ needs.extract-ticket.outputs.ticket_id }}
          STAGE_SEMGREP: ${{ needs.sast-semgrep.result }}
          STAGE_SONARCLOUD: ${{ needs.sast-sonarqube.result }}
          STAGE_DEPENDENCY_SCAN: ${{ needs.dependency-scan.result }}
          STAGE_CONTAINER_SCAN: ${{ needs.container-scan.result }}
          STAGE_SECRET_SCAN: ${{ needs.secret-scan.result }}
          STAGE_DAST_ZAP: ${{ needs.dast-zap.result }}
          STAGE_QUALITY_GATE: ${{ needs.quality-gate.result }}
        run: python scripts/jira_integration.py post-results

  # ── Notify Slack ───────────────────────────────────────────────────
  notify-slack:
    runs-on: ubuntu-latest
    needs: [extract-ticket, sast-semgrep, sast-sonarqube, dependency-scan, container-scan, secret-scan, dast-zap, quality-gate]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TICKET_ID: ${{ needs.extract-ticket.outputs.ticket_id }}
          JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
          STAGE_SEMGREP: ${{ needs.sast-semgrep.result }}
          STAGE_SONARCLOUD: ${{ needs.sast-sonarqube.result }}
          STAGE_DEPENDENCY_SCAN: ${{ needs.dependency-scan.result }}
          STAGE_CONTAINER_SCAN: ${{ needs.container-scan.result }}
          STAGE_SECRET_SCAN: ${{ needs.secret-scan.result }}
          STAGE_DAST_ZAP: ${{ needs.dast-zap.result }}
          STAGE_QUALITY_GATE: ${{ needs.quality-gate.result }}
        run: python scripts/slack_notify.py