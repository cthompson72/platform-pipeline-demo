name: QA Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      experience_id:
        description: 'Experience ID (e.g., PPD-QA-001)'
        required: true
        default: 'PPD-QA-001'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  qa-pipeline:
    name: QA Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ──────────────────────────────────────────
      # Setup
      # ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Experience ID
        id: exp_id
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            EXP_ID="${{ github.event.inputs.experience_id }}"
          else
            BRANCH="${{ github.head_ref }}"
            EXP_ID=$(echo "$BRANCH" | grep -oP 'PPD-\d+' || echo "PPD-0")
          fi
          echo "experience_id=$EXP_ID" >> $GITHUB_OUTPUT
          echo "Experience ID: $EXP_ID"

      # ──────────────────────────────────────────
      # Build and Start Spring Boot
      # ──────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Spring Boot app
        run: ./mvnw clean package -DskipTests -q

      - name: Start Spring Boot in background
        run: |
          java -jar target/*.jar --server.port=8080 &
          echo "Waiting for Spring Boot to start..."

      - name: Wait for app to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/api/products > /dev/null 2>&1; then
              echo "App is healthy!"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 2s..."
            sleep 2
          done
          echo "App failed to start within 60 seconds"
          exit 1

      # ──────────────────────────────────────────
      # Create ServiceNow Change Request
      # ──────────────────────────────────────────
      - name: Create ServiceNow CR
        id: snow_cr
        env:
          SERVICENOW_INSTANCE: ${{ secrets.SERVICENOW_INSTANCE }}
          SERVICENOW_USER: ${{ secrets.SERVICENOW_USER }}
          SERVICENOW_PASSWORD: ${{ secrets.SERVICENOW_PASSWORD }}
          EXPERIENCE_ID: ${{ steps.exp_id.outputs.experience_id }}
        run: |
          CR_RESPONSE=$(curl -s -X POST \
            "https://${SERVICENOW_INSTANCE}.service-now.com/api/now/table/change_request" \
            -u "${SERVICENOW_USER}:${SERVICENOW_PASSWORD}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{
              \"short_description\": \"${EXPERIENCE_ID}: QA Pipeline Run\",
              \"description\": \"Automated QA pipeline run triggered by PR.\\nExperience ID: ${EXPERIENCE_ID}\\nRepo: ${{ github.repository }}\\nPR: #${{ github.event.pull_request.number }}\\nBranch: ${{ github.head_ref }}\",
              \"type\": \"standard\",
              \"category\": \"Software\",
              \"priority\": \"3\",
              \"risk\": \"3\",
              \"impact\": \"3\",
              \"u_experience_id\": \"${EXPERIENCE_ID}\"
            }")

          CR_NUMBER=$(echo "$CR_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['number'])" 2>/dev/null || echo "UNKNOWN")
          CR_SYS_ID=$(echo "$CR_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['sys_id'])" 2>/dev/null || echo "")

          echo "ServiceNow CR: $CR_NUMBER (sys_id: $CR_SYS_ID)"
          echo "cr_number=$CR_NUMBER" >> $GITHUB_OUTPUT
          echo "cr_sys_id=$CR_SYS_ID" >> $GITHUB_OUTPUT

      # ──────────────────────────────────────────
      # Playwright E2E Tests
      # ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: e2e-tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        id: playwright
        working-directory: e2e-tests
        env:
          BASE_URL: http://localhost:8080
          EXPERIENCE_ID: ${{ steps.exp_id.outputs.experience_id }}
        run: |
          npx playwright test 2>&1 | tee playwright-output.txt
          PLAYWRIGHT_EXIT=${PIPESTATUS[0]}
          echo "exit_code=$PLAYWRIGHT_EXIT" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e-tests/playwright-report/
            e2e-tests/test-results.json
            e2e-tests/junit-results.xml

      # ──────────────────────────────────────────
      # k6 Performance Tests
      # ──────────────────────────────────────────
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run k6 load test
        id: k6
        env:
          BASE_URL: http://localhost:8080
          EXPERIENCE_ID: ${{ steps.exp_id.outputs.experience_id }}
        run: |
          mkdir -p perf-tests/results
          k6 run perf-tests/scripts/load-test.js 2>&1 | tee k6-output.txt
          K6_EXIT=${PIPESTATUS[0]}
          echo "exit_code=$K6_EXIT" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-test-results
          path: perf-tests/results/

      # ──────────────────────────────────────────
      # AI Test Generation
      # ──────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install AI test gen dependencies
        run: pip install -r ai-test-gen/requirements.txt

      - name: Run AI test generation
        id: ai_test_gen
        if: github.event_name == 'pull_request'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPERIENCE_ID: ${{ steps.exp_id.outputs.experience_id }}
        run: |
          cd ai-test-gen && python3 main.py \
            --pr-number ${{ github.event.pull_request.number }} \
            --experience-id "$EXPERIENCE_ID" \
            --repo ${{ github.repository }} 2>&1 | tee ../ai-gen-output.txt || true
        continue-on-error: true

      - name: Run AI test generation (manual trigger)
        id: ai_test_gen_manual
        if: github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXPERIENCE_ID: ${{ steps.exp_id.outputs.experience_id }}
        run: |
          cd ai-test-gen && python3 local_test.py 2>&1 | tee ../ai-gen-output.txt || true
        continue-on-error: true

      - name: Upload AI test gen results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-gen-results
          path: ai-test-gen/results/

      # ──────────────────────────────────────────
      # Quality Gate
      # ──────────────────────────────────────────
      - name: Run quality gate
        id: gate
        env:
          EXPERIENCE_ID: ${{ steps.exp_id.outputs.experience_id }}
        run: |
          python3 scripts/quality-gate.py \
            --experience-id "$EXPERIENCE_ID" \
            --e2e-results e2e-tests/test-results.json \
            --perf-results perf-tests/results/load-test-summary.json \
            --ai-gen-results ai-test-gen/results/test-gen-results.json 2>&1 | tee gate-output.txt
          GATE_EXIT=${PIPESTATUS[0]}

          if [ $GATE_EXIT -eq 0 ]; then
            echo "gate_status=PASSED" >> $GITHUB_OUTPUT
          else
            echo "gate_status=FAILED" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-reports/

      # ──────────────────────────────────────────
      # ServiceNow Update
      # ──────────────────────────────────────────
      - name: Post results to ServiceNow
        if: always()
        env:
          SERVICENOW_INSTANCE: ${{ secrets.SERVICENOW_INSTANCE }}
          SERVICENOW_USER: ${{ secrets.SERVICENOW_USER }}
          SERVICENOW_PASSWORD: ${{ secrets.SERVICENOW_PASSWORD }}
          EXPERIENCE_ID: ${{ steps.exp_id.outputs.experience_id }}
        run: |
          python3 scripts/servicenow-quality-report.py \
            --experience-id "$EXPERIENCE_ID" \
            --gate-result "${{ steps.gate.outputs.gate_status || 'UNKNOWN' }}" || true

      # ──────────────────────────────────────────
      # Slack Notification
      # ──────────────────────────────────────────
      - name: Post results to Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          EXPERIENCE_ID: ${{ steps.exp_id.outputs.experience_id }}
        run: |
          python3 scripts/slack-quality-report.py \
            --experience-id "$EXPERIENCE_ID" \
            --gate-result "${{ steps.gate.outputs.gate_status || 'UNKNOWN' }}" || true

      # ──────────────────────────────────────────
      # Final Status
      # ──────────────────────────────────────────
      - name: Quality gate result
        if: always()
        run: |
          echo "================================"
          echo "Quality Gate: ${{ steps.gate.outputs.gate_status || 'UNKNOWN' }}"
          echo "Experience ID: ${{ steps.exp_id.outputs.experience_id }}"
          echo "ServiceNow CR: ${{ steps.snow_cr.outputs.cr_number }}"
          echo "================================"

          if [ "${{ steps.gate.outputs.gate_status }}" == "FAILED" ]; then
            echo "Quality gate FAILED — blocking merge."
            exit 1
          fi